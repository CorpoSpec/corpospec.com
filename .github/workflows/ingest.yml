name: Ingest CorpoSpec release

# Triggered by `beevelop/UNSTARTER`'s release-deploy workflow via
# `repository_dispatch`. Downloads the tagged schema tarball, verifies its
# SHA256, writes `public/schemas/v{version}/`, and commits to main — which in
# turn triggers the Pages deploy.
#
# See: beevelop/UNSTARTER BDR 0044
on:
  repository_dispatch:
    types: [corpospec-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without the leading v)"
        required: true
        type: string
      tag:
        description: "Tag (vX.Y.Z)"
        required: true
        type: string
      tarball_url:
        description: "GitHub Release asset URL for corpospec-schemas-vX.Y.Z.tar.gz"
        required: true
        type: string
      tarball_sha256:
        description: "SHA256 of the tarball"
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: ingest-${{ github.event.client_payload.version || inputs.version }}
  cancel-in-progress: false

jobs:
  ingest:
    name: Ingest v${{ github.event.client_payload.version || inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve payload
        id: payload
        shell: bash
        env:
          CP_VERSION: ${{ github.event.client_payload.version }}
          CP_TAG: ${{ github.event.client_payload.tag }}
          CP_URL: ${{ github.event.client_payload.tarball_url }}
          CP_SHA: ${{ github.event.client_payload.tarball_sha256 }}
          IN_VERSION: ${{ inputs.version }}
          IN_TAG: ${{ inputs.tag }}
          IN_URL: ${{ inputs.tarball_url }}
          IN_SHA: ${{ inputs.tarball_sha256 }}
        run: |
          V="${CP_VERSION:-$IN_VERSION}"
          T="${CP_TAG:-$IN_TAG}"
          U="${CP_URL:-$IN_URL}"
          S="${CP_SHA:-$IN_SHA}"
          test -n "$V" || (echo "::error::Missing version"        && exit 1)
          test -n "$T" || (echo "::error::Missing tag"            && exit 1)
          test -n "$U" || (echo "::error::Missing tarball_url"    && exit 1)
          test -n "$S" || (echo "::error::Missing tarball_sha256" && exit 1)
          echo "version=$V"        >> "$GITHUB_OUTPUT"
          echo "tag=$T"            >> "$GITHUB_OUTPUT"
          echo "tarball_url=$U"    >> "$GITHUB_OUTPUT"
          echo "tarball_sha256=$S" >> "$GITHUB_OUTPUT"

      - name: Refuse overwrite
        shell: bash
        run: |
          DIR="public/schemas/v${{ steps.payload.outputs.version }}"
          if [ -d "$DIR" ]; then
            echo "::error::$DIR already exists — versions are immutable."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run ingest script
        env:
          VERSION: ${{ steps.payload.outputs.version }}
          TARBALL_URL: ${{ steps.payload.outputs.tarball_url }}
          TARBALL_SHA256: ${{ steps.payload.outputs.tarball_sha256 }}
        run: node scripts/ingest-release.mjs

      - name: Configure git
        run: |
          git config user.name  "corpospec-publisher[bot]"
          git config user.email "corpospec-publisher[bot]@users.noreply.github.com"

      - name: Commit + push
        shell: bash
        env:
          V: ${{ steps.payload.outputs.version }}
          T: ${{ steps.payload.outputs.tag }}
        run: |
          git add "public/schemas/v${V}"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "ingest: CorpoSpec schemas ${T}" \
                     -m "Source: ${{ github.event.client_payload.source_repo || 'beevelop/UNSTARTER' }}@${{ github.event.client_payload.source_sha }}"
          git push origin HEAD:main

      - name: Trigger Pages deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
