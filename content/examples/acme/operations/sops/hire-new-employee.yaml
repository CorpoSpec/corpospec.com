id: operations/sops/hire-new-employee
entity: entity/acme-corp
category: hr
name: Hire new employee (onboarding)
version: 1.0.0
objective: >
  Provision system access, enroll in benefits, and complete compliance training
  for a new hire before their first day. Ensures no orphaned accounts, no
  missing HRIS records, and no delayed day-1 productivity.
triggers:
  - Offer letter countersigned; start date confirmed in Rippling.
preconditions:
  - Employment contract executed; background check passed.
  - Role defined in people/roles/; team confirmed.
steps:
  - ordinal: 1
    action: Create Rippling profile; trigger benefits enrollment workflow.
    acceptance_criterion: Rippling record active; employee receives enrollment email.
    assignments:
      - role: people/roles/ceo
        raci: responsible
      - role: people/roles/data-analyst
        raci: consulted
    sla_duration: P2D
    tool_refs: []
  - ordinal: 2
    action: Create Okta account; assign role-based SSO groups; enforce FIDO2 MFA enrollment.
    acceptance_criterion: >
      Okta account active; SSO groups match role; MFA enrollment completed before
      access to any production system.
    assignments:
      - role: people/roles/devops-engineer
        raci: responsible
      - role: people/roles/ceo
        raci: informed
    sla_duration: P1D
    tool_refs: []
  - ordinal: 3
    action: >
      Provision role-specific tool access: GitHub org invite, Linear workspace,
      AWS IAM role (engineers only), Datadog read-only (all), Sentry (engineers).
    acceptance_criterion: All role-appropriate tools provisioned; access documented in HRIS.
    assignments:
      - role: people/roles/devops-engineer
        raci: responsible
    sla_duration: P1D
    tool_refs: []
  - ordinal: 4
    action: >
      Complete security onboarding: phishing simulation enrollment, security
      policy acceptance, privacy policy acknowledgment.
    acceptance_criterion: All three completions recorded in Rippling LMS before end of week 1.
    assignments:
      - role: people/roles/ceo
        raci: accountable
      - role: people/roles/devops-engineer
        raci: responsible
    sla_duration: P5D
    tool_refs: []
  - ordinal: 5
    action: Create CorpoSpec people/team/ record; add to org.yaml.
    acceptance_criterion: Person record exists; org chart updated; validated via corpospec-validate.
    assignments:
      - role: people/roles/ceo
        raci: responsible
    sla_duration: P1D
    tool_refs: []
postconditions:
  - Employee active in Rippling and Okta.
  - All access provisioned per role; documented in HRIS.
  - Security training completed within week 1.
  - CorpoSpec record exists.
control_basis: 'ISO 27001:2022 A.5.18 + A.6.2; SOC 2 CC6.1 + CC6.2; GDPR Art. 29'
owner: people/team/jordan-lee
artefact_ref: null
status: approved
effective_from: '2026-01-01'
review_cadence: P12M
next_review_due: '2027-01-01'
