title: Add composite index on workflow_runs(tenant_id, created_at DESC)
description: >
  Add composite index to address p99 latency regression on POST /v1/runs
  identified during incident 2026-04-015. Index covers the primary query
  path for tenant-scoped run listing and creation timestamp ordering.
justification: >
  Mitigates Sev-2 incident; reduces p99 from 8.2s to target ≤ 350ms.
  Index build via CREATE INDEX CONCURRENTLY — no table lock; zero downtime.
