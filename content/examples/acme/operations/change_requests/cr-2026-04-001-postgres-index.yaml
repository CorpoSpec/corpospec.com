implementer: people/team/raj-patel
affected_systems:
  - security/assets/postgres-prod
impact_assessment: >
  No downtime. CREATE INDEX CONCURRENTLY; brief CPU spike during build
  (~4 minutes). Index storage cost ~180MB. No application changes required.
rollback_plan: operations/runbooks/postgres-failover
