id: operations/runbooks/vector-rebuild
entity: entity/acme-corp
system: operations/services/embedding-worker
name: Vector index full rebuild
version: 1.0.0
trigger: manual
trigger_summary: 'Required after: model upgrade, pgvector schema migration, or corruption detected in vector index'
owner: people/team/raj-patel
steps:
  - ordinal: 1
    kind: diagnose
    action: Confirm scope — full rebuild or partial tenant rebuild
    command: 'SELECT count(*), min(created_at), max(created_at) FROM workflow_embeddings WHERE model_version = $OLD_MODEL'
    expected_observable: Row count gives rebuild duration estimate (~500 rows/min at current throughput)
    rollback: null
  - ordinal: 2
    kind: fix
    action: Pause embedding-worker auto-scaling; set desired count to 0
    command: 'aws ecs update-service --cluster acme-prod --service embedding-worker --desired-count 0'
    expected_observable: ECS shows 0 running tasks
    rollback: 'aws ecs update-service --cluster acme-prod --service embedding-worker --desired-count 2'
  - ordinal: 3
    kind: fix
    action: Truncate stale embeddings table for the affected model version
    command: 'DELETE FROM workflow_embeddings WHERE model_version = $OLD_MODEL'
    expected_observable: Rows deleted; table vacuumed
    rollback: Restore from point-in-time RDS snapshot if truncation was incorrect
  - ordinal: 4
    kind: fix
    action: Enqueue all workflow IDs for re-embedding via admin backfill endpoint
    command: 'POST /internal/admin/embeddings/backfill {"model_version": "$NEW_MODEL", "tenant_ids": "all"}'
    expected_observable: SQS queue depth increases to expected row count
    rollback: null
  - ordinal: 5
    kind: fix
    action: Scale embedding-worker back up
    command: 'aws ecs update-service --cluster acme-prod --service embedding-worker --desired-count 4'
    expected_observable: Workers processing queue; Datadog shows queue depth decreasing
    rollback: null
  - ordinal: 6
    kind: verify
    action: Validate embedding coverage — confirm 100% of active workflows have embeddings
    command: 'SELECT count(*) FROM workflows w LEFT JOIN workflow_embeddings e ON w.id = e.workflow_id WHERE e.id IS NULL AND w.status = ''active'''
    expected_observable: Zero rows — all active workflows have embeddings
    rollback: null
parent_sop: null
dashboard_ref: null
status: approved
recent_executions: []
last_drilled: null
next_drill_due: '2026-08-01'
