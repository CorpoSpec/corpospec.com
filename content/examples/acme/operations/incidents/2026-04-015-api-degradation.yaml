runbook_refs:
  - operations/runbooks/postgres-failover
root_cause: >
  Schema migration adding workflow_runs.priority column (2026-04-12) omitted
  index on tenant_id. Query planner chose sequential scan at low data volumes
  in staging; full-table scan at production scale (8.4M rows) triggered by
  batch-job traffic burst from enterprise customer.
contributing_factors:
  - CI schema-migration checks did not include EXPLAIN ANALYZE against production-scale data.
  - No query-plan regression alert in Datadog for new table shapes post-migration.
  - Batch-job from customer had no rate limiting on their side; 340 concurrent run-create calls in 90s.
