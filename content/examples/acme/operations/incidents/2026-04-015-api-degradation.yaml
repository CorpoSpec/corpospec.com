id: operations/incidents/2026-04-015-api-degradation
entity: entity/acme-corp
kind: performance_degradation
severity: sev2
status: resolved
title: API p99 latency spike — POST /v1/runs degraded to 8s; 14 enterprise customers affected
summary: >
  A missing composite index on the workflow_runs.tenant_id column caused a
  full-table scan on every POST /v1/runs request during an unexpected traffic
  spike from a customer's scheduled batch job. p99 latency increased from
  350ms to 8.2s for 47 minutes. 14 enterprise customers experienced timeout
  errors; SLA credits issued to customers on enterprise-2026 agreement.
  Root cause identified as a schema migration merged without EXPLAIN-on-large-
  table CI gate.
