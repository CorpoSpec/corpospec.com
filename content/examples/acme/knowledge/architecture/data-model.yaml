id: knowledge/architecture/data-model
kind: architecture_artefact
type: data_model
title: "Acme Core Data Model"
version: "1.4"
as_of: "2026-03-15"
authors:
  - "Blake Nguyen (Head of Engineering)"

description: >
  Core entity model for the Acme platform. Defines the primary aggregates,
  their relationships, and the partitioning strategy for multi-tenant isolation.

tenancy_model:
  strategy: "Shared database, row-level isolation"
  partition_key: "workspace_id (UUID)"
  enforcement: "PostgreSQL Row Security Policies on all tenant-scoped tables"

entities:
  - name: Workspace
    description: "Top-level tenant boundary. Maps to a customer account."
    primary_key: workspace_id
    key_fields:
      - name: workspace_id
        type: UUID
        notes: "Immutable after creation."
      - name: plan
        type: enum
        values: ["starter", "growth", "business", "enterprise"]
      - name: seat_count
        type: integer
      - name: billing_customer_id
        type: string
        notes: "Stripe customer ID."

  - name: WorkflowDefinition
    description: "Declarative specification of a workflow (steps, triggers, branching logic)."
    primary_key: workflow_id
    tenant_scoped: true
    key_fields:
      - name: workflow_id
        type: UUID
      - name: workspace_id
        type: UUID
        notes: "Foreign key to Workspace."
      - name: name
        type: string
      - name: definition
        type: jsonb
        notes: "Versioned DAG of step definitions."
      - name: status
        type: enum
        values: ["draft", "active", "archived"]
      - name: version
        type: integer
        notes: "Monotonically incrementing."

  - name: WorkflowRun
    description: "A single execution instance of a workflow definition."
    primary_key: run_id
    tenant_scoped: true
    key_fields:
      - name: run_id
        type: UUID
      - name: workflow_id
        type: UUID
      - name: workspace_id
        type: UUID
      - name: status
        type: enum
        values: ["queued", "running", "completed", "failed", "cancelled"]
      - name: trigger_type
        type: enum
        values: ["manual", "scheduled", "api", "webhook", "ai_agent"]
      - name: started_at
        type: timestamp_utc
      - name: completed_at
        type: timestamp_utc
        nullable: true

  - name: Integration
    description: "A connected third-party service with credentials and configuration."
    primary_key: integration_id
    tenant_scoped: true
    key_fields:
      - name: integration_id
        type: UUID
      - name: workspace_id
        type: UUID
      - name: service_slug
        type: string
        notes: "e.g. 'salesforce', 'slack', 'sap-business-one'"
      - name: credentials_ref
        type: string
        notes: "Reference to encrypted credentials in AWS Secrets Manager."
      - name: status
        type: enum
        values: ["active", "error", "revoked"]

indexes:
  - table: WorkflowRun
    columns: [workspace_id, status, started_at]
    type: btree
    reason: "Primary filter for dashboard run list view."
  - table: WorkflowRun
    columns: [workflow_id, started_at]
    type: btree
    reason: "Per-workflow execution history queries."

data_retention:
  run_events: "90 days (configurable to 365 for Enterprise)"
  run_step_logs: "30 days"
  audit_log: "7 years (immutable append-only log)"
