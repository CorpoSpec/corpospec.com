id: knowledge/glossary/saas-metrics
kind: glossary
title: "SaaS Metrics Glossary"
scope: company_wide
as_of: "2026-03-01"
maintained_by: "Alex Chen, Quinn Murphy"

terms:
  - term: ARR
    full_name: "Annual Recurring Revenue"
    definition: >
      The annualized value of all active subscription contracts at a point in time.
      Calculated as: sum of all active MRR × 12. Excludes one-time fees, professional
      services, and usage overages.
    unit: USD
    formula: "SUM(active_mrr) × 12"
    related_terms: [MRR]

  - term: MRR
    full_name: "Monthly Recurring Revenue"
    definition: >
      The total contracted monthly subscription revenue from all active accounts.
      The base unit for all recurring revenue calculations.
    unit: USD
    formula: "SUM(monthly_contract_value FOR all active subscriptions)"
    related_terms: [ARR]

  - term: NRR
    full_name: "Net Revenue Retention"
    definition: >
      Measures revenue retained from a cohort of existing customers over 12 months,
      including expansions and contraction/churn. NRR > 100% means the existing
      customer base is growing without new logo acquisition.
    unit: percentage
    formula: "(Starting ARR + Expansion ARR - Contraction ARR - Churned ARR) / Starting ARR × 100"
    target: ">110% (world-class for B2B SaaS)"
    acme_current: 116

  - term: ACV
    full_name: "Annual Contract Value"
    definition: >
      The average annual revenue value of a single customer contract.
      Used to segment deal sizes and calculate sales team productivity.
    unit: USD
    formula: "Total contract value / contract length in years"

  - term: Churn
    full_name: "Customer Churn Rate"
    definition: >
      The percentage of customers (logo churn) or ARR (revenue churn) lost in a period.
      Acme tracks both logo and revenue churn separately.
    unit: percentage
    variants:
      - name: Logo Churn
        formula: "Customers churned in period / Customers at start of period × 100"
      - name: Revenue Churn
        formula: "ARR churned in period / ARR at start of period × 100"

  - term: CAC
    full_name: "Customer Acquisition Cost"
    definition: >
      The total sales and marketing spend required to acquire one new paying customer.
      Includes fully-loaded salaries, tools, and ad spend.
    unit: USD
    formula: "Total S&M spend in period / New customers acquired in period"
    acme_current: 3900

  - term: LTV
    full_name: "Customer Lifetime Value"
    definition: >
      The predicted total gross profit generated by a customer over the full duration
      of their relationship with Acme.
    unit: USD
    formula: "ARPU × Gross Margin % × (1 / Churn Rate)"
    acme_current: 43200

  - term: Payback
    full_name: "CAC Payback Period"
    definition: >
      The number of months required to recover the cost of acquiring a customer
      from that customer's gross profit contribution.
    unit: months
    formula: "CAC / (MRR per customer × Gross Margin %)"
    target: "<18 months (healthy for B2B SaaS)"
    acme_current: 9.5

  - term: Magic Number
    full_name: "SaaS Magic Number"
    definition: >
      A capital efficiency metric that measures new ARR generated per dollar of S&M spend.
      A value above 0.75 indicates efficient growth.
    unit: ratio
    formula: "(Net New ARR in quarter × 4) / S&M spend in prior quarter"

  - term: Runway
    full_name: "Cash Runway"
    definition: >
      The number of months the company can operate at its current net burn rate
      before running out of cash.
    unit: months
    formula: "Cash on hand / Net monthly burn"
    acme_current: 20

  - term: NPS
    full_name: "Net Promoter Score"
    definition: >
      A customer loyalty metric ranging from -100 to +100. Calculated as
      % Promoters (score 9–10) minus % Detractors (score 0–6).
    unit: integer (-100 to 100)
    formula: "% Promoters - % Detractors"
    target: ">50 (excellent)"
    acme_current: 61

  - term: MAU
    full_name: "Monthly Active Users"
    definition: >
      Unique users who performed at least one meaningful action (workflow creation,
      execution, or integration setup) in a 30-day window.
    unit: count

  - term: DAU
    full_name: "Daily Active Users"
    definition: >
      Unique users who performed at least one meaningful action in a 24-hour window.
    unit: count

  - term: "DAU/MAU"
    full_name: "Daily Active Users to Monthly Active Users Ratio"
    definition: >
      A stickiness metric. Higher ratios indicate more frequent, habitual usage.
      0.5+ is considered strong for B2B SaaS workflow tools.
    unit: ratio
    formula: "DAU / MAU"

  - term: Retention Cohort
    full_name: "Customer Retention Cohort"
    definition: >
      A group of customers who started their subscription in the same time period
      (e.g., Q3-2025), tracked together over time to measure how revenue from that
      cohort evolves. Used to identify product-market fit trends and churn seasonality.

  - term: Gross Margin
    full_name: "Gross Profit Margin"
    definition: >
      Revenue minus cost of goods sold (COGS) divided by revenue. For SaaS,
      COGS includes hosting, third-party APIs, and customer support.
    unit: percentage
    formula: "(Revenue - COGS) / Revenue × 100"
    target: ">70% (healthy SaaS gross margin)"

  - term: MoM
    full_name: "Month-over-Month Growth"
    definition: "Percentage change in a metric between the current and prior calendar month."
    unit: percentage

  - term: QoQ
    full_name: "Quarter-over-Quarter Growth"
    definition: "Percentage change in a metric between the current and prior quarter."
    unit: percentage

  - term: YoY
    full_name: "Year-over-Year Growth"
    definition: "Percentage change in a metric compared to the same period in the prior year."
    unit: percentage

  - term: COGS
    full_name: "Cost of Goods Sold"
    definition: >
      Direct costs attributable to delivering the SaaS product, including cloud
      infrastructure, third-party API costs, and customer support labor.
    unit: USD

  - term: ARR Bridge
    full_name: "ARR Bridge"
    definition: >
      A visualization showing ARR movement from one period to the next,
      broken into: new ARR (new logos), expansion ARR (upgrades/seats),
      contraction ARR (downgrades), and churned ARR. The "bridge" explains
      net new ARR.
