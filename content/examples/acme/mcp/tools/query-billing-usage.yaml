id: mcp/tools/query-billing-usage
kind: mcp_tool
name: "query_billing_usage"
server: mcp/servers/acme-api
description: >
  Returns current-period billing usage metrics for the authenticated workspace,
  including run execution count, seat count, and overage status. Read-only.
  Intended for financial dashboards, burn-rate monitoring agents, and
  leadership reporting.

access_roles:
  - leadership
  - engineering

rate_limit_rpm: 30

input_schema:
  type: object
  properties:
    period:
      type: string
      description: "Billing period in YYYY-MM format. Defaults to current billing period."
      pattern: "^\\d{4}-(?:0[1-9]|1[0-2])$"
  additionalProperties: false

output_schema:
  type: object
  properties:
    workspace_id:
      type: string
      format: uuid
    period:
      type: string
    plan:
      type: string
      enum: [starter, growth, business, enterprise]
    billing_period_start:
      type: string
      format: date
    billing_period_end:
      type: string
      format: date
    seats:
      type: object
      properties:
        included: {type: integer}
        used: {type: integer}
        overage: {type: integer}
    workflow_runs:
      type: object
      properties:
        included: {type: integer}
        used: {type: integer}
        overage: {type: integer}
        overage_rate_usd_per_run: {type: number}
    estimated_overage_charge_usd:
      type: number
    next_invoice_estimate_usd:
      type: number

audit_log_on_call: true
fields_logged: [workspace_id, period_queried, caller_role, latency_ms]

errors:
  - code: "PERIOD_NOT_AVAILABLE"
    http_status: 404
    when: "The requested billing period predates the workspace creation date."
  - code: "INSUFFICIENT_SCOPE"
    http_status: 403
    when: "Caller does not have `billing:read` scope (implicit in leadership and engineering roles)."
