id: mcp/tools/query-workflow-runs
kind: mcp_tool
name: "query_workflow_runs"
server: mcp/servers/acme-api
description: >
  Returns a paginated list of workflow run records for the authenticated workspace.
  Supports filtering by workflow ID, status, trigger type, and time range.
  Read-only. Suitable for dashboards, monitoring agents, and reporting.

access_roles:
  - readonly
  - engineering
  - leadership

rate_limit_rpm: 120

input_schema:
  type: object
  properties:
    workflow_id:
      type: string
      format: uuid
      description: "Filter to runs of a specific workflow. Optional."
    status:
      type: string
      enum: [queued, running, completed, failed, cancelled]
      description: "Filter by run status. Optional."
    trigger_type:
      type: string
      enum: [manual, scheduled, api, webhook, ai_agent]
      description: "Filter by how the run was triggered. Optional."
    from_date:
      type: string
      format: date-time
      description: "ISO 8601 UTC timestamp. Returns runs started at or after this time."
    to_date:
      type: string
      format: date-time
      description: "ISO 8601 UTC timestamp. Returns runs started before this time."
    after:
      type: string
      description: "Cursor for pagination. Use the `next_cursor` value from a prior response."
    limit:
      type: integer
      minimum: 1
      maximum: 100
      default: 25
  additionalProperties: false

output_schema:
  type: object
  properties:
    runs:
      type: array
      items:
        type: object
        properties:
          run_id:
            type: string
            format: uuid
          workflow_id:
            type: string
            format: uuid
          workflow_name:
            type: string
          status:
            type: string
          trigger_type:
            type: string
          started_at:
            type: string
            format: date-time
          completed_at:
            type: string
            format: date-time
            nullable: true
          duration_ms:
            type: integer
            nullable: true
          error_message:
            type: string
            nullable: true
    next_cursor:
      type: string
      nullable: true
    total_count:
      type: integer

audit_log_on_call: true
fields_logged: [workspace_id, filters_applied, result_count, latency_ms]

errors:
  - code: "UNAUTHORIZED"
    http_status: 401
    when: "JWT is missing, expired, or lacks required scope."
  - code: "RATE_LIMITED"
    http_status: 429
    when: "Request exceeds the RPM limit for the caller's role."
  - code: "INVALID_CURSOR"
    http_status: 400
    when: "The `after` cursor is expired or malformed."
