id: mcp/tools/register-webhook
kind: mcp_tool
name: "register_webhook"
server: mcp/servers/acme-api
description: >
  Registers a webhook endpoint to receive real-time events for workflow
  run lifecycle changes. State-mutating. Requires `webhooks:write` scope.
  Maximum 10 active webhooks per workspace on Growth/Business; unlimited on Enterprise.

access_roles:
  - engineering

rate_limit_rpm: 20

input_schema:
  type: object
  required: [url, events]
  properties:
    url:
      type: string
      format: uri
      description: "HTTPS endpoint that will receive webhook POST requests."
    events:
      type: array
      items:
        type: string
        enum:
          - run.queued
          - run.started
          - run.completed
          - run.failed
          - run.cancelled
      minItems: 1
      description: "Subset of run lifecycle events to subscribe to."
    description:
      type: string
      maxLength: 256
      description: "Human-readable label for this webhook (displayed in UI)."
    secret:
      type: string
      minLength: 32
      description: >
        HMAC-SHA256 signing secret. Acme will sign each payload with this
        secret using the `X-Acme-Signature-256` header. Caller is responsible
        for validating signatures on their end.
  additionalProperties: false

output_schema:
  type: object
  properties:
    webhook_id:
      type: string
      format: uuid
    url:
      type: string
    events:
      type: array
      items:
        type: string
    status:
      type: string
      enum: [active]
    created_at:
      type: string
      format: date-time
    test_delivery_queued:
      type: boolean
      description: "True if a test event was queued to verify the endpoint is reachable."

audit_log_on_call: true
fields_logged: [workspace_id, webhook_id, url_domain, events_subscribed, latency_ms]

errors:
  - code: "QUOTA_EXCEEDED"
    http_status: 429
    when: "Workspace has reached the webhook limit for its plan."
  - code: "INVALID_URL"
    http_status: 400
    when: "URL is not HTTPS or does not pass reachability check."
  - code: "DUPLICATE_URL"
    http_status: 409
    when: "A webhook with this URL and overlapping event set already exists."
