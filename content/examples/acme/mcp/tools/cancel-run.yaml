id: mcp/tools/cancel-run
kind: mcp_tool
name: "cancel_run"
server: mcp/servers/acme-api
description: >
  Cancels an in-progress workflow run. Has no effect on runs that are
  already in a terminal state (completed, failed, cancelled). State-mutating.
  Requires `runs:execute` scope.

access_roles:
  - engineering

rate_limit_rpm: 60

input_schema:
  type: object
  required: [run_id]
  properties:
    run_id:
      type: string
      format: uuid
      description: "The run to cancel."
    reason:
      type: string
      maxLength: 256
      description: "Human-readable reason for cancellation. Stored in the run's audit log."
  additionalProperties: false

output_schema:
  type: object
  properties:
    run_id:
      type: string
      format: uuid
    previous_status:
      type: string
    new_status:
      type: string
      enum: [cancelled]
    cancelled_at:
      type: string
      format: date-time
    was_noop:
      type: boolean
      description: "True if the run was already in a terminal state; no action taken."

audit_log_on_call: true
fields_logged: [workspace_id, run_id, previous_status, reason_provided, latency_ms]

errors:
  - code: "RUN_NOT_FOUND"
    http_status: 404
    when: "The run_id does not exist in the caller's workspace."
  - code: "UNAUTHORIZED"
    http_status: 403
    when: "Caller does not have `runs:execute` scope."
