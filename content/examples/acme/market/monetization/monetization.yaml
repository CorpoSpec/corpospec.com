# yaml-language-server: $schema=https://corpospec.com/schemas/v0.7.1/monetization.schema.json
id: market/monetization/monetization
model: freemium-plus-usage
name: "Acme Platform Monetization"
description: >
  Freemium acquisition model with usage-based expansion. Free tier drives
  product-led growth and self-serve onboarding. Paid tiers monetize through
  per-seat pricing with usage-based overages for AI workflow executions.
  Enterprise tier adds custom pricing, dedicated support, and SLA guarantees.

pricing:
  model: freemium-plus-usage
  structure: "per-seat with usage-based overages"
  base_price_monthly: 29.0
  free_tier: "Up to 3 users, 100 workflow executions per month, 5 active workflows"
  paid_tier: "Unlimited workflow executions scaling with tier, advanced AI templates, priority support"
  pricing_direction: "Value-based expansion through seat growth and AI usage"
  pricing_rationale: >
    Pricing anchored to comparable B2B SaaS workflow tools (Zapier, Monday.com,
    Asana). Free tier is generous enough to deliver genuine value and drive
    word-of-mouth. Starter tier targets small teams scaling past the free limits.
    Pro tier captures mid-market teams needing advanced automation and analytics.
    Enterprise tier is custom-priced for organizations with compliance, SSO,
    and dedicated support requirements.
  target_arr_per_customer: 3480.0
  tiers:
    - name: "Free"
      price_monthly: 0.0
      scope: "Up to 3 users, 100 AI workflow executions/month, 5 active workflows, community support"
      employee_access: false
      cost_markup: null
      note: "Designed as the primary acquisition channel. No credit card required."
    - name: "Starter"
      price_monthly: 29.0
      scope: "Up to 10 users, 1,000 AI workflow executions/month, unlimited active workflows, email support"
      employee_access: false
      cost_markup: null
      note: "Entry point for growing teams. Per-seat pricing at $29/seat/month."
    - name: "Pro"
      price_monthly: 79.0
      scope: "Up to 50 users, 10,000 AI workflow executions/month, advanced analytics, custom AI templates, priority support"
      employee_access: false
      cost_markup: null
      note: "Mid-market tier. Per-seat pricing at $79/seat/month. Overage at $0.02 per additional execution."
    - name: "Enterprise"
      price_monthly: null
      scope: "Unlimited users, unlimited executions, SSO/SAML, dedicated CSM, custom SLA, audit logging, data residency"
      employee_access: true
      cost_markup: null
      note: "Custom annual contract. Minimum $50,000 ACV. Negotiated per engagement."
  discount_programs:
    - name: "Annual Commitment"
      description: "20% discount on monthly price when billed annually. Applies to Starter and Pro tiers."
    - name: "Startup Program"
      description: "50% discount for the first 12 months for companies with fewer than 20 employees and under $5M in funding. Requires application."
    - name: "Non-Profit"
      description: "30% perpetual discount for registered 501(c)(3) organizations."
  usage_based_pricing:
    model: "usage-based overage"
    unit: "AI workflow execution"
    description: "Overage charges apply when a team exceeds the included execution quota for their tier."
    billing: "Monthly in arrears, metered via Stripe usage records"
    margin_strategy: "Cost-plus with margin expansion at scale"
    margin_target_longterm: 0.75

ad_strategy: null

referral_program:
  trigger: "Referred user converts to a paid Starter or Pro plan"
  tracking_method: "Unique referral link with 90-day attribution window tracked via PostHog"
  tiers:
    # Baseline row (#228): structurally represents the "no referrals → no
    # bonus" state so the tier ladder is complete from zero.
    - threshold: 0
      reward:
        kind: badge
        description: "Default: standard paid-plan experience. No bonus."
    - threshold: 1
      reward:
        kind: trial-extension
        duration_days: 30
        description: "One month free on current plan"
    - threshold: 3
      reward:
        kind: trial-extension
        duration_days: 90
        description: "Three months free on current plan"
    - threshold: 10
      reward:
        kind: discount
        percent: 25
        description: "Lifetime 25% discount on any paid plan"

related_decisions:
  - governance/decisions/0004-pricing-model
  - governance/decisions/0012-sales-motion
  - governance/decisions/0025-onboarding-flow
