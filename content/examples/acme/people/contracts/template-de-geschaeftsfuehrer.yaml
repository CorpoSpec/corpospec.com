id: people/contracts/templates/de-geschaeftsfuehrer-anstellungsvertrag
entity: entity/acme-eu-gmbh
template_kind: executive_service_agreement
jurisdiction: DE
employment_kind: geschaeftsfuehrer
description: >
  Geschäftsführer-Anstellungsvertrag pursuant to § 35 GmbHG.
  Governs the service relationship between Acme Corp GmbH and its
  managing director(s). Distinguishes corporate organ (GmbHG) from
  employment law (BGB § 611a). Includes D&O coverage reference.
key_clauses:
  - "Organ vs. employment law distinction per BAG jurisprudence"
  - "Notice period: 3 months employer and employee (§ 622 BGB)"
  - "Post-contractual non-compete: 12 months, 50% Karenzentschädigung"
  - "IP assignment: all work product during term assigned to GmbH"
  - "GDPR Art. 6(1)(b) consent record for employment-context PII"
  - "D&O insurance provided by entity at cost"
version: "2026-05"
approved_by: people/team/david-tanaka
effective_from: "2026-05-01"
pii_class: internal
