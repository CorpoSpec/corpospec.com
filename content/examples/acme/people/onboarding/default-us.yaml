id: people/onboarding/plans/default-us
entity: entity/acme-corp
name: Default US onboarding (≤90 days)
applies_to_roles: []
tasks:
  - key: i9-e-verify
    title: I-9 employment eligibility verification + E-Verify
    onboarding_category: admin_paperwork
    default_owner: people/team/jordan-lee
    due_offset_days: 0
    mandatory: true
    description: "Form I-9 completed day 1; E-Verify submitted within 3 business days per DHS rules."
  - key: w4-state-tax
    title: Federal W-4 + CA DE-4 tax withholding election
    onboarding_category: admin_paperwork
    default_owner: people/team/jordan-lee
    due_offset_days: 0
    mandatory: true
    description: "Employee elects federal and state withholding allowances."
  - key: 401k-enrollment
    title: 401(k) enrollment (Guideline)
    onboarding_category: benefits
    default_owner: people/team/jordan-lee
    due_offset_days: 7
    mandatory: false
    description: "Guideline 401(k) enrollment link sent; default 4% employee + 4% employer match from day 1."
  - key: health-benefits-election
    title: Health, dental, vision benefits election
    onboarding_category: benefits
    default_owner: people/team/jordan-lee
    due_offset_days: 7
    mandatory: true
    description: "Anthem PPO health, MetLife dental, VSP vision. 30-day election window from start date."
  - key: equity-grant-acceptance
    title: Equity grant acceptance (Carta)
    onboarding_category: admin_paperwork
    default_owner: people/team/jordan-lee
    due_offset_days: 5
    mandatory: true
    description: "Stock option grant accepted via Carta; 4-year vest, 1-year cliff."
  - key: piia-signing
    title: Proprietary Information and Inventions Agreement
    onboarding_category: compliance
    default_owner: people/team/david-tanaka
    due_offset_days: 0
    mandatory: true
    description: "PIIA signed before or on day 1. Template: people/contracts/templates/us-piia."
  - key: security-awareness
    title: Security awareness training (annual)
    onboarding_category: compliance
    default_owner: people/team/maria-rodriguez
    due_offset_days: 7
    mandatory: true
    description: "KnowBe4 security awareness module; annual recertification."
  - key: harassment-prevention-ca
    title: CA sexual harassment prevention training
    onboarding_category: compliance
    default_owner: people/team/jordan-lee
    due_offset_days: 30
    mandatory: true
    description: "2-hour (supervisors) or 1-hour (ICs) DFEH-compliant training per CA Gov Code §12950.1."
  - key: laptop-access
    title: Laptop + SSO + MFA provisioned
    onboarding_category: access_setup
    default_owner: people/team/raj-patel
    due_offset_days: 0
    mandatory: true
    description: "MacBook issued, 1Password + Okta SSO + Duo MFA configured before day 1."
  - key: 30-day-check-in
    title: 30-day milestone check-in
    onboarding_category: milestone
    default_owner: people/team/jordan-lee
    due_offset_days: 30
    mandatory: true
    description: "Manager 1:1 — trajectory calibration, early blockers, culture fit."
  - key: 90-day-review
    title: 90-day performance review
    onboarding_category: milestone
    default_owner: people/team/jordan-lee
    due_offset_days: 90
    mandatory: true
    description: "Formal 90-day check-in; confirms probation completion and role fit."
effective_from: "2026-01-15"
effective_to: null
