location: Datadog US1 (AWS us-east-1)
retention_policy: >
  Metrics retained 15 months; logs retained 15 days hot + 30 days archive
  per Datadog plan; traces retained 15 days. Review retention against GDPR
  data-minimisation obligations annually.
disposal_method: logical_deletion
regulatory_implications: 'GDPR Art. 5(1)(e) data-minimisation; SOC 2 CC7.1'
