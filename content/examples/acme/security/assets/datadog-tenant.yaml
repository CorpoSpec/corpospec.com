id: security/assets/datadog-tenant
entity: entity/acme-corp
asset_kind: saas_application
name: Datadog tenant (acme-prod)
description: >
  Observability platform ingesting metrics, traces, and logs from all
  production services. Contains operational PII in log streams (user IDs,
  IP addresses). SSO via Okta; RBAC configured with read-only access for
  most engineers; admin access restricted to on-call SRE and CISO.
canonical_ref: operations/services/api
owner: people/team/maria-rodriguez
custodian: people/team/raj-patel
