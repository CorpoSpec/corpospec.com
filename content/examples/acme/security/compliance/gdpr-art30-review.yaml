title: Annual GDPR Article 30 Records of Processing Activities review
citation: GDPR Art. 30(1)
description: >
  Review all records of processing activities (ROPA) at least annually or
  upon material change in processing scope. Acme Corp GmbH (Berlin) processes
  personal data of EU-based customers and their end users as data controller;
  updates required when new processing activities are introduced, vendors
  change, or retention periods are revised.
