id: security/controls/vendor-management
entity: entity/acme-corp
short_id: VM-1
name: Vendor and supply-chain management
description: >
  Vendor onboarding SOP requiring security review, SOC 2 / ISO 27001 evidence
  collection, GDPR Art. 28 DPA execution, and sub-processor registry entry
  before production access granted. Critical-tier vendors (AWS, Anthropic,
  Stripe) reassessed annually; triggered reassessment on material incident or
  contractual change. Risk-tiered approach: critical, high, medium, low.
category: process
control_type: preventive
status: implemented_monitored
maturity: managed
framework_mappings:
  - framework: ISO 27001:2022 Annex A
    clause: A.5.19
  - framework: ISO 27001:2022 Annex A
    clause: A.5.20
  - framework: ISO 27001:2022 Annex A
    clause: A.5.21
  - framework: SOC 2 TSC 2017
    clause: CC9.2
  - framework: NIST CSF 2.0
    clause: ID.SC-1
  - framework: GDPR
    clause: Art. 28
procedure_refs:
