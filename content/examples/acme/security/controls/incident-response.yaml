id: security/controls/incident-response
entity: entity/acme-corp
short_id: IR-1
name: Incident response and breach notification
description: >
  Documented incident-response plan covering detection, triage, containment,
  eradication, recovery, and post-mortem. PagerDuty on-call rotation for
  Tier-1 services with 5-minute escalation. GDPR Art. 33 supervisory-
  notification process targets 64-hour filing; Art. 34 data-subject
  notification within 72 hours of confirmed scope. Tested quarterly via
  tabletop drills. Breach register maintained per Art. 33(5).
category: process
control_type: detective
status: implemented_monitored
