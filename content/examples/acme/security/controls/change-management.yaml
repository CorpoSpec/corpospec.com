id: security/controls/change-management
entity: entity/acme-corp
short_id: CM-1
name: Change management
description: >
  Documented change-request process with risk-based classification (standard,
  normal, emergency). CAB approval required for normal-class changes affecting
  production. Post-implementation review (PIR) mandatory for medium-risk and
  above. All infrastructure changes tracked as change_request records; IaC
  changes require passing CI and peer approval before merge.
category: process
control_type: preventive
