id: security/controls/backup-recovery
entity: entity/acme-corp
short_id: BR-1
name: Backup and recovery
description: >
  Continuous WAL streaming from RDS Postgres to S3 with 5-minute granularity.
  Daily automated snapshots retained 30 days; weekly snapshots to cold Glacier
  retained 1 year. Cross-region replication to eu-central-1 for DR. Quarterly
  restore drills validate RPO ≤ 15 min and RTO ≤ 4 h for Tier-1 services.
category: technological
control_type: recovery
status: implemented_monitored
maturity: defined
