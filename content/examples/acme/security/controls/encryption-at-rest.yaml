id: security/controls/encryption-at-rest
entity: entity/acme-corp
short_id: SC-1
name: Encryption at rest
description: >
  All customer data and internal PII encrypted at rest using AES-256-GCM via
  AWS KMS envelope encryption. RDS storage encrypted at volume level; S3
  buckets use SSE-KMS. Keys rotate annually; key usage logged to CloudTrail.
  Application-layer field encryption applied to PII columns in Postgres.
category: technological
control_type: preventive
status: implemented_monitored
maturity: defined
