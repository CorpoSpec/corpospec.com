id: security/controls/access-management
entity: entity/acme-corp
short_id: AC-1
name: Identity and access management
description: >
  Centralised SSO via Okta with hardware-backed FIDO2 MFA enforced for all
  production systems. RBAC at API and database layers. Privileged-access
  changes require change-request approval and quarterly access review.
  Service-account credentials rotated every 90 days via AWS Secrets Manager.
