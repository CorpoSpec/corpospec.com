    items:
      - "Monthly P&L actuals 2025-2026"
      - "Cap table (current + pro forma post-round)"
      - "3-year financial model with assumptions"
      - "Customer cohort retention data"
  - section: legal
    items:
      - "Certificate of incorporation + amendments"
      - "All investor agreements (Series A)"
      - "IP assignment agreements (all founders + employees)"
      - "Material contracts (top 20 customers)"
      - "Employment agreements (executive team)"
  - section: product
    items:
      - "Architecture overview"
      - "Security overview + SOC 2 readiness report"
      - "Roadmap (12 months)"
  - section: go_to_market
    items:
      - "Customer list with ACV and cohort"
      - "Sales pipeline (anonymized)"
      - "References (3 ENT customers pre-approved)"
