# yaml-language-server: $schema=https://corpospec.com/schemas/v0.7.1/integration.schema.json
id: integrations/sources/app-store-connect
name: "App Store Connect"
system: "App Store Connect"
type: source
status: active

input_port:
  name: "app-store-connect-api"
  protocols:
    - kind: rest
  authentication: api_key

data_contract:
  owner: people/team/sarah-kim
  freshness:
    schedule: "daily"
    max_staleness_minutes: 1440
  schema:
    fields:
      - name: app_id
        type: string
        required: true
      - name: downloads
        type: integer
        required: true
      - name: revenue
        type: number
        required: true
      - name: ratings
        type: number
        required: true
      - name: date
        type: string
        required: true

pipeline:
  date_field: date
  mappings:
    - source_field: downloads
      target: metrics/growth/ios-downloads
      aggregation: sum
    - source_field: revenue
      target: metrics/revenue/ios-revenue
      aggregation: sum
    - source_field: ratings
      target: metrics/engagement/ios-ratings
      aggregation: avg
      breakdown_by: app_id

outputs: []

typed_config:
  kind: appstoreconnect
  team_id: "A1B2C3D4E5"
  bundle_id: "com.acme.workflow"
  app_name: "Acme Workflow"
  display_name: "Acme"
  category: "Productivity"
  age_rating: "4+"
  content_rating: "No objectionable content"
  fastlane_path: "fastlane/Fastfile"
  ci_workflow_ref: ".github/workflows/ios-release.yml"
  territories:
    - US
    - GB
    - DE
    - FR
    - NL

secret_bindings:
  - env_var: APP_STORE_CONNECT_API_KEY
    source:
      kind: vault-ref
      reference: "ops/ios/app-store-connect-api-key"
    role: api-token
    notes: "Rotated quarterly via Release Engineering runbook."
  - env_var: APP_STORE_CONNECT_KEY_ID
    source:
      kind: environment
    role: api-key-id
