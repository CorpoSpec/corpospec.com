# yaml-language-server: $schema=https://corpospec.com/schemas/v0.7.1/integration.schema.json
id: integrations/sources/crm-attio
name: "Attio CRM"
system: "Attio"
type: source
status: draft

input_port:
  name: "attio-api"
  protocols:
    - kind: rest
  authentication: api_key

data_contract:
  owner: people/team/alex-chen
  freshness:
    schedule: "hourly"
    max_staleness_minutes: 60
  schema:
    fields:
      - name: contact_id
        type: string
        required: true
      - name: company_id
        type: string
        required: false
      - name: deal_stage
        type: string
        required: false
      - name: deal_value
        type: number
        required: false
      - name: last_activity
        type: string
        required: false

pipeline:
  date_field: last_activity
  mappings:
    - source_field: deal_value
      target: metrics/sales/pipeline-value
      aggregation: sum
      breakdown_by: deal_stage
    - source_field: contact_id
      target: metrics/sales/active-contacts
      aggregation: count

outputs: []
