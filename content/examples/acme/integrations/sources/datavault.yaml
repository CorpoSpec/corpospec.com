# yaml-language-server: $schema=https://corpospec.com/schemas/v0.7.1/integration.schema.json
id: integrations/sources/datavault
name: "DataVault"
system: "DataVault"
type: source
status: active

input_port:
  name: "datavault-api"
  protocols:
    - kind: rest
  authentication: api_key

data_contract:
  owner: people/team/sarah-kim
  freshness:
    schedule: "realtime"
    max_staleness_minutes: 1
  schema:
    fields:
      - name: table_name
        type: string
        required: true
      - name: row_data
        type: string
        required: true
      - name: updated_at
        type: string
        required: true

pipeline:
  date_field: updated_at
  mappings:
    - source_field: row_data
      target: metrics/operations/database-writes
      aggregation: count
      breakdown_by: table_name

outputs: []
