# yaml-language-server: $schema=https://corpospec.com/schemas/v0.7.1/integration.schema.json
id: integrations/sources/accounting-puzzle
name: "Puzzle Accounting"
system: "Puzzle"
type: source
status: draft

input_port:
  name: "puzzle-api"
  protocols:
    - kind: rest
  authentication: api_key

data_contract:
  owner: people/team/alex-chen
  freshness:
    schedule: "daily"
    max_staleness_minutes: 1440
  schema:
    fields:
      - name: account_id
        type: string
        required: true
      - name: transaction_date
        type: string
        required: true
      - name: amount
        type: number
        required: true
      - name: category
        type: string
        required: true
      - name: description
        type: string
        required: false

pipeline:
  date_field: transaction_date
  mappings:
    - source_field: amount
      target: metrics/finance/accounting-transactions
      aggregation: sum
      breakdown_by: category

outputs: []
