# yaml-language-server: $schema=https://corpospec.com/schemas/v0.13.1/metric.schema.json
id: metrics/definitions/runway
name: Cash Runway
abbreviation: Runway
description: Months of operation remaining at current burn rate.
formula: cash_and_equivalents / abs(monthly_burn_rate)
unit: months
direction: up
frequency: monthly
source:
  system: quickbooks
  query: accounts.balance(type=bank) / abs(metrics/definitions/burn-rate)
xbrl_mapping: null
related_metrics:
- metrics/definitions/burn-rate
iso_30414_mapping: null
tags:
- financial-health
- investor-facing
