id: legal/action-items/nis2-essential-entity-assessment
item: "Assess NIS2 Directive applicability and register if required (Acme Corp GmbH)"
status: pending
priority: medium
due_date: "2026-09-01"
note: >
  NIS2 Directive (EU 2022/2555) transposed into German law via BSIG-Novelle.
  Assessment needed once Acme Corp GmbH is operational and EU customer count
  is established. Initial view: Acme is a digital service provider (DSP) under
  NIS2 Annex II — cloud computing services / online marketplaces category.
  If EU headcount < 50 and EU annual turnover < EUR 10M, Acme falls below
  the threshold for 'important entities'. Re-evaluate at EUR 5M EU ARR.
  Hengeler Mueller to advise on BSI registration obligation.
