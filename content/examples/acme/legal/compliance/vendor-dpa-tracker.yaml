# yaml-language-server: $schema=https://corpospec.com/schemas/v0.7.1/vendor-dpa-tracker.schema.json
id: legal/compliance/vendor-dpa-tracker
name: "Vendor DPA Tracker"
description: "Tracks data processing agreements with third-party vendors handling personal data."
as_of: "2026-03-01"
vendors:
  - name: "AWS"
    dpa_status: signed
    dpa_date: "2025-07-01"
    data_categories:
      - "Customer project data"
      - "User account information"
    processing_location: "US (us-east-1)"
  - name: "DataVault"
    dpa_status: signed
    dpa_date: "2025-08-15"
    data_categories:
      - "User authentication data"
      - "Application state"
    processing_location: "US"
  - name: "NovaMind AI"
    dpa_status: signed
    dpa_date: "2025-09-01"
    data_categories:
      - "Workflow content for AI processing"
    processing_location: "US"
  - name: "Datadog"
    dpa_status: signed
    dpa_date: "2025-10-01"
    data_categories:
      - "Application logs and metrics"
    processing_location: "US"
