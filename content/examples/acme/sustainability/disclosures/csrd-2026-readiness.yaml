id: sustainability/disclosures/csrd-2026-readiness
name: "CSRD / ESRS Readiness Assessment 2026"
entity: entity/acme-corp
framework: csrd_esrs
reporting_period_start: "2026-01-01"
reporting_period_end: "2026-12-31"
applicability_wave: 2
applicability_note: >
  Acme Corp, Inc. is incorporated in Delaware and exceeds the SEC climate
  disclosure thresholds (>$75M revenue) once ARR reaches ~$10M. EU
  subsidiary entity/acme-eu-gmbh triggers CSRD wave-2 applicability once
  it exceeds EU large-company thresholds (250+ employees or €40M+ revenue).
  Current status: voluntary readiness-gap tracking. Formal CSRD filing
  obligation projected 2028 reporting year.
assurance_provider: vendors/kpmg-llp
assurance_level: limited
material_topics:
  - topic: esrs_e1_climate
    materiality: double
    impact_material: true
    financial_material: true
    rationale: >
      Carbon footprint of cloud infrastructure (Scope 3 cat. 1) is material
      to impact. Transition risk from carbon pricing on AWS/cloud spend is
      material to enterprise value at scale.
    sub_topics:
      - ghg_emissions
      - energy_mix
      - climate_transition_plan
    readiness_status: in_progress
    gaps:
      - "Scope 3 cat. 1 uses spend-based proxy; activity-based data not yet obtained from AWS"
      - "Climate transition plan not yet drafted"
    emission_inventory_ref: sustainability/emissions/2026
  - topic: esrs_s1_workforce
    materiality: double
    impact_material: true
    financial_material: true
    rationale: >
      Pay equity exposure (EU 2023/970 Pay Transparency Directive) is
      financial-material. Workforce welfare of 50-person team is impact-material
      given Acme's direct control.
    sub_topics:
      - working_conditions
      - pay_equity
      - diversity_inclusion
    readiness_status: gap
    gaps:
      - "Pay equity analysis not yet conducted; compensation data exists in vendors/gusto"
      - "D&I metrics not yet tracked systematically"
      - "Working conditions policy documents exist but not mapped to ESRS S1 disclosure points"
  - topic: esrs_s2_workers_value_chain
    materiality: single
    impact_material: false
    financial_material: true
    rationale: >
      Key vendors (AWS, OpenAI, Anthropic) have material workforce
      risks in their own supply chains. Financial materiality via
      reputational exposure if a key vendor faces a supply-chain
      labour controversy.
    sub_topics:
      - supply_chain_labour
    readiness_status: gap
    gaps:
      - "Vendor supply-chain labour assessments rely on vendor self-attestation only"
    supply_chain_ref: sustainability/supply-chain/2026
  - topic: esrs_g1_conduct
    materiality: double
    impact_material: true
    financial_material: true
    rationale: >
      Business conduct policies (CoC, whistleblower, anti-corruption)
      are both impact-material (workforce welfare, customer trust) and
      financial-material (regulatory fines under EU anti-corruption rules).
    sub_topics:
      - business_conduct
      - anti_corruption
      - whistleblower_protection
    readiness_status: partial
    gaps:
      - "Whistleblower channel is email alias only; formal anonymous channel not yet established"
      - "Anti-corruption training not yet documented"
  - topic: esrs_e3_water
    materiality: not_material
    impact_material: false
    financial_material: false
    rationale: >
      SaaS business with no manufacturing; water consumption limited to
      office use in landlord-managed building. Not material.
    sub_topics: []
    readiness_status: not_applicable
    gaps: []
  - topic: esrs_e4_biodiversity
    materiality: not_material
    impact_material: false
    financial_material: false
    rationale: >
      No land use, extraction, or physical asset operations. Not material.
    sub_topics: []
    readiness_status: not_applicable
    gaps: []
disclosure_status: draft
filed_at: null
published_report: null
created_at: "2026-04-15"
last_updated: "2026-05-01"
